[profile.default]
src = "contracts"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Robinhood Chain testnet — EVM-compatible Arbitrum L2, chain ID 46630, gas token ETH.
[rpc_endpoints]
rh_testnet = "${RH_TESTNET_RPC}"

# Verification uses the testnet Blockscout explorer (API key usually not required).
[etherscan]
rh_testnet = { key = "${BLOCKSCOUT_API_KEY}", chain = 46630, url = "https://explorer.testnet.chain.robinhood.com/api/" }
